<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAS RAFLES PETUGAS MBG 10 RIBU!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-main: #FF6B00;
            --orange-light: #FF9E53;
            --white: #FFFFFF;
            --gray-bg: #EAEAEA;
            --stainless: #A0AAB2;
            --stainless-dark: #707A82;
            --retro-black: #1A1A1A;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--orange-light);
            background-image: radial-gradient(var(--orange-main) 15%, transparent 16%);
            background-size: 24px 24px;
            font-family: 'Fredoka', sans-serif;
            color: var(--retro-black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            border: 6px solid var(--retro-black);
            border-radius: 20px;
            box-shadow: 8px 8px 0px var(--retro-black);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- UI HEADER --- */
        header {
            text-align: center;
            border-bottom: 4px dashed var(--retro-black);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: var(--orange-main);
            margin: 5px 0;
            text-shadow: 2px 2px 0px var(--retro-black);
            line-height: 1.4;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--retro-black);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin-top: 10px;
        }

        #timer {
            color: #FFD700;
        }

        /* --- STAINLESS TRAY --- */
        #tray-area {
            background: linear-gradient(135deg, var(--stainless) 0%, #D1D8DD 50%, var(--stainless-dark) 100%);
            border: 5px solid var(--retro-black);
            border-radius: 15px;
            height: 200px;
            position: relative;
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
            padding: 15px;
        }

        #tray-area::before {
            content: "TRAY MBG PAS 10 RB";
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: rgba(0,0,0,0.2);
        }

        .food-on-tray {
            animation: dropIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            cursor: pointer;
            position: relative;
        }

        @keyframes dropIn {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* --- LIVE BUDGET COUNTER --- */
        #budget-counter {
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            background: #FFF3E0;
            border: 3px solid var(--retro-black);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            color: #2E7D32;
        }

        #budget-counter.warning {
            color: #C62828;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translateX(2px); }
            50% { transform: translateX(-2px); }
            100% { transform: translateX(2px); }
        }

        /* --- FOOD PANELS (KANTIN STYLE) --- */
        #food-market {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            background: var(--gray-bg);
            padding: 10px;
            border-radius: 10px;
            border: 3px solid var(--retro-black);
        }

        .food-item {
            background: var(--white);
            border: 3px solid var(--retro-black);
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 0 var(--retro-black);
            position: relative;
        }

        .food-item:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--retro-black);
        }

        .food-sprite {
            font-size: 32px;
            margin-bottom: 2px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.2));
        }

        .food-name {
            font-size: 11px;
            font-weight: bold;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .food-price {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            background: var(--orange-main);
            color: var(--white);
            padding: 2px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 3px;
        }

        /* --- SERVE BUTTON --- */
        #serve-btn {
            background: #4CAF50;
            color: var(--white);
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            padding: 15px;
            border: 4px solid var(--retro-black);
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--retro-black);
            width: 100%;
        }

        #serve-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--retro-black);
        }

        /* --- SCREEN OVERLAYS (START/GAMEOVER) --- */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--white);
            border-radius: 14px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .overlay h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .overlay p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .meme-subtext {
            font-weight: bold;
            color: #C62828;
            font-size: 16px;
            background: #FFEBEE;
            padding: 8px;
            border: 2px dashed #C62828;
            border-radius: 5px;
        }

        .btn-action {
            background: var(--orange-main);
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            padding: 12px 24px;
            border: 3px solid var(--retro-black);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--retro-black);
        }

        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--retro-black);
        }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h1>MAS RAFLES<br>PETUGAS MBG 10 RIBU!</h1>
            <p style="font-size: 12px; max-width: 80%;">Susun makanan di tray sekolah. Total harga harus <b>PAS Rp 10.000</b>! Jangan korupsi, jangan bengkak!</p>
            <button class="btn-action" onclick="startGame()">MULAI TUGAS!</button>
        </div>

        <div id="gameover-screen" class="overlay hide">
            <h2 id="go-title">GAME OVER</h2>
            <p id="go-reason"></p>
            <p id="go-subtext" class="meme-subtext"></p>
            <p style="margin-top: 15px; font-family:'Press Start 2P'; font-size:10px;">Ronde Bertahan: <span id="final-round">0</span></p>
            <button class="btn-action" onclick="startGame()">COBA LAGI</button>
        </div>

        <header>
            <h1>PAS 10 RIBU!</h1>
            <div class="stats-bar">
                <div>RONDE: <span id="round-display">1</span></div>
                <div id="timer">WAKTU: <span id="time-display">20</span>s</div>
            </div>
        </header>

        <p style="font-size: 10px; margin: 0 0 5px 0; text-align: center; color: #666;">*Klik makanan di dalam tray untuk membuangnya</p>
        <div id="tray-area" onclick="removeFood(event)"></div>

        <div id="budget-counter">Rp 0</div>

        <div id="food-market"></div>

        <button id="serve-btn" onclick="checkServing()">SAJIKAN!</button>
    </div>

    <script>
        // Data Master Makanan (Menggunakan Emoji bergaya Pixel/Colorful)
        const foodMaster = [
            { name: "Nasi Putih", emoji: "🍚", basePrice: 2000 },
            { name: "Ayam Goreng", emoji: "🍗", basePrice: 4000 },
            { name: "Ikan Tepung", emoji: "🐟", basePrice: 3000 },
            { name: "Sayur Capcay", emoji: "🥦", basePrice: 1500 },
            { name: "Buah Pisang", emoji: "🍌", basePrice: 1000 },
            { name: "Susu Kotak", emoji: "🧃", basePrice: 2500 }
        ];

        let currentRound = 1;
        let timeLeft = 20;
        let timerInterval;
        let currentTotal = 0;
        let trayItems = [];
        let baseTime = 20;

        const foodMarketEl = document.getElementById('food-market');
        const trayAreaEl = document.getElementById('tray-area');
        const budgetCounterEl = document.getElementById('budget-counter');
        const roundDisplayEl = document.getElementById('round-display');
        const timeDisplayEl = document.getElementById('time-display');

        function startGame() {
            // Reset state
            currentRound = 1;
            baseTime = 20;
            trayItems = [];
            currentTotal = 0;
            
            // Sembunyikan Overlay
            document.getElementById('start-screen').classList.add('hide');
            document.getElementById('gameover-screen').classList.add('hide');
            
            startRound();
        }

        function startRound() {
            trayItems = [];
            currentTotal = 0;
            updateTrayUI();
            
            // Hitung kecepatan waktu (makin naik ronde, makin cepat)
            timeLeft = Math.max(6, baseTime - (currentRound * 2)); 
            timeDisplayEl.innerText = timeLeft;
            roundDisplayEl.innerText = currentRound;

            // Generate Item Makanan dengan Trik Harga Mengecoh pada ronde tinggi
            generateFoodMarket();

            // Jalankan Timer
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplayEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameOver("WAKTU HABIS!", "Siswa Keburu Kelaparan Demo di Depan Kantor", "Dicopot dari Jabatan");
                }
            }, 1000);
        }

        function generateFoodMarket() {
            foodMarketEl.innerHTML = '';
            
            // Mengacak urutan dan memodifikasi harga untuk membuat chaos
            foodMaster.forEach((food) => {
                let finalPrice = food.basePrice;
                
                // Mekanisme Chaos: Di atas ronde 2, harga mulai diacak/mengecoh pecahan ganjil
                if (currentRound > 2) {
                    let randomOffset = (Math.floor(Math.random() * 3) - 1) * 250; // -250, 0, +250
                    finalPrice = Math.max(500, food.basePrice + randomOffset);
                }
                // Ronde super chaos: harga jadi recehan pecah banget
                if (currentRound > 5) {
                    finalPrice += (Math.floor(Math.random() * 10) * 20); // Tambahan Rp20 - Rp180 rupiah!
                }

                const itemDiv = document.createElement('div');
                itemDiv.className = 'food-item';
                itemDiv.innerHTML = `
                    <div class="food-sprite">${food.emoji}</div>
                    <span class="food-name">${food.name}</span>
                    <div class="food-price">Rp${finalPrice.toLocaleString('id-ID')}</div>
                `;
                
                // Tambah item ke tray saat diklik
                itemDiv.onclick = () => addFood(food.emoji, finalPrice);
                foodMarketEl.appendChild(itemDiv);
            });
        }

        function addFood(emoji, price) {
            trayItems.push({ emoji, price });
            currentTotal += price;
            updateTrayUI();
        }

        // Fitur hapus makanan jika salah pencet
        function removeFood(event) {
            const target = event.target.closest('.food-on-tray');
            if (!target) return;
            
            const index = target.dataset.index;
            currentTotal -= trayItems[index].price;
            trayItems.splice(index, 1);
            updateTrayUI();
        }

        function updateTrayUI() {
            trayAreaEl.innerHTML = '';
            trayItems.forEach((item, index) => {
                const foodDiv = document.createElement('div');
                foodDiv.className = 'food-on-tray';
                foodDiv.dataset.index = index;
                foodDiv.style.fontSize = '40px';
                foodDiv.innerText = item.emoji;
                trayAreaEl.appendChild(foodDiv);
            });

            // Update Teks Total Budget
            budgetCounterEl.innerText = `Rp ${currentTotal.toLocaleString('id-ID')}`;
            
            if (currentTotal > 10000) {
                budgetCounterEl.classList.add('warning');
            } else {
                budgetCounterEl.classList.remove('warning');
            }
        }

        function checkServing() {
            clearInterval(timerInterval);

            if (currentTotal === 10000) {
                // Sukses Pas 10 Ribu!
                currentRound++;
                alert(`🔥 MANTAP PAS! Ronde ${currentRound-1} Selesai. Lanjut Tugas Berikutnya! Tempo Makin Cepat!`);
                startRound();
            } else if (currentTotal > 10000) {
                // Kebanyakan / Membengkak
                gameOver("ANGGARAN MEMBENGKAK!", "Total pengeluaran Anda: Rp " + currentTotal.toLocaleString('id-ID'), "Dipanggil Rapat Mendadak");
            } else {
                // Kurang / Dituduh Korupsi
                gameOver("ANGGARAN GAK SESUAI!", "Kurang dari 10 Ribu dikira mau disunat. Total: Rp " + currentTotal.toLocaleString('id-ID'), "Kamu Diduga Korupsi");
            }
        }

        function gameOver(title, reason, subtext) {
            clearInterval(timerInterval);
            document.getElementById('go-title').innerText = title;
            document.getElementById('go-reason').innerText = reason;
            document.getElementById('go-subtext').innerText = subtext;
            document.getElementById('final-round').innerText = currentRound;
            document.getElementById('gameover-screen').classList.remove('hide');
        }
    </script>
</body>
</html>
